name: Compile Resume PDFs

on:
  push:
    paths:
      - 'resume_files/**/*.tex'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-and-commit:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tectonic
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            texlive \
            texlive-formats-extra \
            texlive-fonts-extra \
            texlive-bibtex-extra \
            make \
            git

      - name: Compile resume PDFs
        run: |
          cd resume_files
          pdflatex -interaction=nonstopmode ./resume-fancy.tex || true
          pdflatex -interaction=nonstopmode ./resume.tex || true

      - name: Copy generated PDFs to public
        run: |
          mkdir -p public

          if [ -f resume_files/resume-fancy.pdf ]; then
            cp resume_files/resume-fancy.pdf public/bobby_dhanoolal_resume_fancy.pdf || true
          else
            echo "resume-fancy.pdf not generated; skipping copy"
          fi

          if [ -f resume_files/resume.pdf ]; then
            cp resume_files/resume.pdf public/bobby_dhanoolal_resume.pdf || true
          else
            echo "resume.pdf not generated; skipping copy"
          fi

      - name: Commit updated PDFs
        run: |
          if [ -f public/bobby_dhanoolal_resume_fancy.pdf ] || [ -f public/bobby_dhanoolal_resume.pdf ]; then
             echo "PDFs updated, preparing to commit changes"
          else
             echo "No PDFs generated, skipping commit"
             exit 0
          fi
          
          git config user.name "github-actions[bot]" || true
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com" || true
          git add public/bobby_dhanoolal_resume_fancy.pdf public/bobby_dhanoolal_resume.pdf || true
          git commit -m "chore: update compiled resume PDFs" || true
          git push || true
