name: Compile Resume PDFs

on:
  push:
    paths:
      - 'resume_files/**/*.tex'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tectonic
        run: |
          curl -fsSL https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-musl.tar.gz \
            | tar xzf - -C /tmp
          chmod +x /tmp/tectonic

      - name: Compile resume PDFs
        run: |
          cd resume_files
          /tmp/tectonic resume-fancy.tex || true
          /tmp/tectonic resume.tex || true

      - name: Copy generated PDFs to public
        run: |
          if [ -f resume_files/resume-fancy.pdf ]; then
            cp resume_files/resume-fancy.pdf public/bobby_dhanoolal_resume_fancy.pdf
          else
            echo "resume-fancy.pdf not generated; skipping copy"
          fi

          if [ -f resume_files/resume.pdf ]; then
            cp resume_files/resume.pdf public/bobby_dhanoolal_resume.pdf
          else
            echo "resume.pdf not generated; skipping copy"
          fi

      - name: Commit updated PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/bobby_dhanoolal_resume_fancy.pdf public/bobby_dhanoolal_resume.pdf
          git commit -m "chore: update compiled resume PDFs"
          git push
